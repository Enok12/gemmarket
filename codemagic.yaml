workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 22.0.0
      java: 21
      groups:
        - android-signing
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > android/app/ggmp-release.keystore
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/android/app/ggmp-release.keystore \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
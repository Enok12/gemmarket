<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GGMP - No Connection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin-bottom: 2rem;
      border-radius: 20px;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: #f0eeff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon svg {
      width: 36px;
      height: 36px;
      color: #6235eb;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 2rem;
    }

    .btn {
      background: #6235eb;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 280px;
      transition: background 0.2s;
    }

    .btn:active { background: #5025d1; }

    .status {
      margin-top: 1.5rem;
      font-size: 13px;
      color: #9ca3af;
    }

    .checking {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 1.5rem;
      color: #6235eb;
      font-size: 14px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #e0d9ff;
      border-top-color: #6235eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <img
    src="https://res.cloudinary.com/dapowzg6d/image/upload/v1778816597/Copilot_20260515_104255_a6in1o.png"
    alt="GGMP Logo"
    class="logo"
    onerror="this.style.display='none'"
  />

  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <h1>No Internet Connection</h1>
  <p>Please check your Wi-Fi or mobile data and try again.</p>

  <button class="btn" onclick="tryAgain()">Try Again</button>

  <div class="checking" id="checking">
    <div class="spinner"></div>
    Checking connection…
  </div>

  <p class="status" id="status">Waiting for connection…</p>

  <script>
    // Auto retry every 5 seconds
    let retryInterval = setInterval(checkConnection, 5000)

    function tryAgain() {
      document.getElementById('checking').style.display = 'flex'
      document.getElementById('status').style.display = 'none'
      checkConnection()
    }

    function checkConnection() {
      if (navigator.onLine) {
        clearInterval(retryInterval)
        // Redirect back to app
        window.location.href = 'https://gemmarket.vercel.app'
      } else {
        document.getElementById('checking').style.display = 'none'
        document.getElementById('status').style.display = 'block'
        document.getElementById('status').textContent = 'Still no connection. Retrying…'
      }
    }

    // Listen for connection restore
    window.addEventListener('online', () => {
      clearInterval(retryInterval)
      window.location.href = 'https://gemmarket.vercel.app'
    })
  </script>

</body>
</html>

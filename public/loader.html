<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GGMP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 2.5rem;
    }

    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0d9ff;
      border-top-color: #6235eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <img
    src="https://res.cloudinary.com/dapowzg6d/image/upload/v1778816597/Copilot_20260515_104255_a6in1o.png"
    alt="GGMP Logo"
    class="logo"
  />

  <h1>GGMP</h1>
  <p>Global Gem Marketplace</p>

  <div class="spinner-wrap">
    <div class="spinner"></div>
  </div>

  <script>
    function loadApp() {
      if (navigator.onLine) {
        window.location.href = 'https://gemmarket.vercel.app'
      } else {
        window.location.href = '/offline.html'
      }
    }

    // Wait 2.5 seconds then load app
    setTimeout(loadApp, 2500)
  </script>

</body>
</html>
